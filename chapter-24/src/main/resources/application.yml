spring:
  application:
    name: cinetrack
  datasource:
    url: jdbc:postgresql://localhost:5432/cinetrack
    username: cinetrack
    password: cinetrack
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

jwt:
  secret: change-me-in-production-use-a-real-256-bit-base64-encoded-key
